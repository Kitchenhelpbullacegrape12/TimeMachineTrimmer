<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2e23"/>
      <stop offset="100%" stop-color="#052015"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F6E56" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0F6E56" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="6"/>
