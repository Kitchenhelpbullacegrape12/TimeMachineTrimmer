  <line x1="120" y1="140" x2="280" y2="140" stroke="#0F6E56" stroke-width="1" opacity="0.4"/>
  <text x="200" y="175" text-anchor="middle" font-family="Helvetica Neue, sans-serif" font-size="12" fill="#4A685C">Drag app to Applications</text>
  <text x="200" y="260" text-anchor="middle" font-family="Helvetica Neue, sans-serif" font-size="10" fill="#3D5A4E">Built with &lt;3 for Time Machine users</text>
