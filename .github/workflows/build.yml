name: Build

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v3

      - name: Install signing certificate
        if: ${{ secrets.MAC_SIGN_CERT != '' }}
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASS="temp-password"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security import <(echo "${{ secrets.MAC_SIGN_CERT }}" | base64 -d) \
            -f pkcs12 -k "${{ secrets.MAC_SIGN_PW }}" -P "${{ secrets.MAC_SIGN_PW }}" \
            -T /usr/bin/codesign -T /usr/bin/productsign -A "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "::add-mask::$KEYCHAIN_PASS"

      - name: Build (signed)
        if: ${{ secrets.MAC_SIGN_CERT != '' }}
        run: |
          xcodebuild build \
            -project TimeMachineTrimmer.xcodeproj \
            -scheme TimeMachineTrimmer \
            -configuration Release \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Build (unsigned)
        if: ${{ secrets.MAC_SIGN_CERT == '' }}
        run: |
          xcodebuild build \
            -project TimeMachineTrimmer.xcodeproj \
            -scheme TimeMachineTrimmer \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Automatic

      - name: Cleanup
        if: ${{ always() }}
        run: |
          security delete-keychain "build.keychain" 2>/dev/null || true
          rm -rf ~/Library/MobileDevice/ProvisioningProfiles 2>/dev/null || true
